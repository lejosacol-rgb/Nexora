<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora | Tecnología que transforma ideas</title>

    <link rel="icon" type="image/x-icon" href="./icons/favicon.ico?v=1">
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32x32.png?v=1">
    <link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16x16.png?v=1">
    <link rel="apple-touch-icon" href="./icons/favicon-512x512.png?v=1">
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#6a5cff">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f0f1a;
            --card: #18182a;
            --accent1: #6a5cff;
            --accent2: #00c2ff;
            --text: #ffffff;
            --sub: #b0b0d0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; scroll-behavior: smooth; }

        nav { 
            position: fixed; width: 100%; top: 0; left: 0; 
            background: rgba(15, 15, 26, 0.95); padding: 15px 30px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; border-bottom: 1px solid rgba(106, 92, 255, 0.2); 
        }
        nav .logo { 
            font-weight: 700; font-size: 1.5rem; 
            background: linear-gradient(90deg, var(--accent1), var(--accent2)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }
        nav .menu a { margin-left: 25px; color: var(--text); text-decoration: none; font-weight: 500; transition: 0.3s; }
        nav .menu a:hover { color: var(--accent1); }

        header { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; 
            position: relative; overflow: hidden; 
        }
        #particles-js { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 0; }
        header > * { position: relative; z-index: 1; }

        header h1 { 
            font-size: 3.5rem; font-weight: 700; 
            background: linear-gradient(90deg, var(--accent1), var(--accent2)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }
        
        section { padding: 80px 20px; max-width: 1200px; margin: auto; }
        .projects { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { 
            background: var(--card); padding: 30px; border-radius: 20px; 
            transition: 0.4s; border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .card:hover { transform: translateY(-8px); border: 1px solid var(--accent1); }
        
        footer { text-align: center; padding: 40px 20px; background: #0c0c15; color: var(--sub); }
    </style>
</head>
<body>

<nav>
    <div class="logo">Nexora</div>
    <div class="menu">
        <a href="#proyectos">Proyectos</a>
        <a href="#sobre">Sobre</a>
    </div>
</nav>

<header>
    <div id="particles-js"></div>
    <h1>Nexora</h1>
    <p>Tecnología que transforma ideas en sistemas reales.</p>
</header>

<section id="proyectos">
    <div class="projects">
        <div class="card"><h3>Control de Pagos</h3><p>Gestión avanzada de clientes.</p></div>
        <div class="card"><h3>Nexora Studio</h3><p>Editor visual de proyectos.</p></div>
    </div>
</section>

<footer>© 2026 Nexora. Fundado por Lejosaco.</footer>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script>
    particlesJS('particles-js', {
        "particles": {
            "number": { "value": 50 },
            "color": { "value": "#6a5cff" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.3 },
            "size": { "value": 3 },
            "line_linked": { "enable": true, "distance": 120, "color": "#6a5cff", "opacity": 0.2, "width": 1 },
            "move": { "enable": true, "speed": 1 }
        }
    });
</script>
</body>
</html>
